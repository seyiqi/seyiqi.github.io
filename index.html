---
layout: default
---

<style>
	#latest-repos-container h2 {
		margin-bottom: 2rem;
	}

	#latest-repos h4 {
		margin-bottom: 0.5rem;
	}
</style>

<section class="hero is-fullheight is-default">
	<div class="hero-body">
		<div id="info-container" class="container has-text-centered">
			<div class="columns is-vcentered">
				<div class="column is-two-thirds is-centered has-nice-link" itemscope itemtype="http://schema.org/Person">
					<img id="profile-pic" src="profile1.jpg" width="250" height="250" itemprop="image">
					<h1 class="title is-2" itemprop="name">Yiqiu Shen</h1>
					<h2 class="subtitle is-4" itemprop="description">PhD Candidate in Data Science, New York University</h2>
					<p>I study deep learning models for medical image analysis, under the supervision of Professor <a href="http://www.kyunghyuncho.me/">Kyunghyun Cho</a> and Professor <a href="https://cs.nyu.edu/~kgeras/">Krzysztof J. Geras</a>.</p>
					<br>
					<p class="has-text-centered">
						<a class="button is-large is-white" href="https://scholar.google.com/citations?user=XaeN2zgAAAAJ&hl=en">
							<span class="icon">
								<i class="fa fa-google"></i>
							</span>
							<span>Google Scholar</span>
						</a>
						<a class="button is-large is-white" href="https://github.com/seyiqi">
							<span class="icon">
								<i class="fa fa-github"></i>
							</span>
							<span>Code</span>
						</a>
						<a class="button is-large is-white" href="https://www.linkedin.com/in/yiqiu-shen-a2317782/">
							<span class="icon">
								<i class="fa fa-linkedin"></i>
							</span>
							<span>Linkedin</span>
						</a>
					</p>
					<hr id="latest-blog-post-separator">
				</div>
			</div>
		</div>
	</div>
	<div class="hero-foot">
		<div class="container">
			<div class="tabs is-centered">
				<ul>
					<li>
						<i id="scroll-hint" class="fa fa-caret-down" aria-hidden="true"></i>
					</li>
				</ul>
			</div>
		</div>
	</div>
</section>
